name: Diag Windows

# TEMPORARY — not for merge. Fast Windows-only loop for investigating
# locationMatch. Triggers only on pushes to the investigation branch.
on:
  push:
    branches:
      - investigate-windows-locationmatch

permissions:
  contents: read

jobs:
  diag:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test ./cmd/desync -run TestLocationEquality -v
